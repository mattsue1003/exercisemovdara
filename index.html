<style>

  html{scroll-behavior:smooth}
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);

  img{max-width:100%}
  h1,h2,h3{margin:0}

  /* ---------- HERO ---------- */
  .hero{position:relative;overflow:hidden;
    background:radial-gradient(1200px 400px at 80% -10%,#3aa37c 0%,transparent 60%),
               linear-gradient(135deg,#2f8f6b,#1a6249);
    color:#fff;padding:max(30px,env(safe-area-inset-top)) 0 34px}
  .hero .blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
  .hero .b1{width:260px;height:260px;top:-90px;right:-40px}
  .hero .b2{width:160px;height:160px;bottom:-70px;left:10%}
  .hero .b3{width:90px;height:90px;top:30px;left:42%;background:rgba(255,255,255,.05)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;
    font-size:clamp(1.5rem,4.6vw,2.15rem);letter-spacing:.5px}
  .brand .logo{font-size:1.15em;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
  .tagline{margin:10px 0 0;opacity:.96;font-size:clamp(1rem,2.7vw,1.15rem);font-weight:500}
  .hero-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .hb{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
    padding:6px 14px;border-radius:999px;font-size:.86rem;font-weight:600}

  /* ---------- FEATURE (本週) ---------- */
  .feature{margin:-22px auto 8px;position:relative;z-index:3}
  .fcard{background:var(--card);border-radius:24px;box-shadow:var(--shadow-h);

    border:1px solid var(--line)}
  .fthumb{position:relative;display:block;background:#0a0a0a;min-height:230px}

  .fplay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}

  .fribbon{position:absolute;left:0;top:18px;background:var(--accent);color:#fff;
    font-weight:800;font-size:.92rem;padding:8px 16px 8px 14px;border-radius:0 999px 999px 0;
    box-shadow:0 4px 12px rgba(217,106,60,.45);letter-spacing:.5px}
  .fdur{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.82);color:#fff;
    padding:4px 11px;border-radius:8px;font-size:.9rem;font-weight:700}
  .fbody{padding:22px 24px 24px;display:flex;flex-direction:column;gap:12px}
  .feyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--accent-d);

  .feyebrow .wk{background:var(--accent-l);padding:3px 12px;border-radius:999px}

  .fmeta{color:var(--sub);font-size:.95rem}
  .fmeta b{color:var(--ink)}
  .ftags{display:flex;flex-wrap:wrap;gap:7px}
  .fnote{color:var(--sub);font-size:.96rem;margin:0}

  .fopen:hover{background:var(--accent-d);transform:translateY(-1px)}

  /* ---------- CONTROLS ---------- */

  .ctop{display:flex;gap:10px;align-items:center}
  .search{flex:1;min-height:var(--tap);padding:12px 16px 12px 46px;border:2px solid var(--line);

    border:2px solid var(--line);background:#fff;border-radius:14px;font-weight:700;color:var(--ink);
    cursor:pointer;white-space:nowrap;font-size:.95rem}
  .moreBtn .dot{display:none;width:9px;height:9px;border-radius:50%;background:var(--accent)}

  .panel.open{display:flex}
  .group{display:flex;align-items:flex-start;gap:10px}
  .group .lbl{flex:0 0 42px;font-size:.9rem;font-weight:800;color:var(--sub);padding-top:7px}
  .pills{display:flex;flex-wrap:wrap;gap:8px;flex:1}

    background:#fff;color:var(--sub);padding:5px 14px;border-radius:999px;font-size:.92rem;
    cursor:pointer;transition:.15s;font-weight:600}
  .pill:hover{border-color:var(--brand);color:var(--brand-d)}
  .pill.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .bar2{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0 0;flex-wrap:wrap}
  .count{color:var(--sub);font-size:.95rem;font-weight:700}
  .clear{display:none;background:none;border:none;color:var(--accent-d);font-weight:700;
    cursor:pointer;font-size:.95rem;text-decoration:underline}
  .clear.show{display:inline-block}

  /* ---------- SECTION + GRID ---------- */
  .sec{padding:22px 0 8px;display:flex;align-items:baseline;gap:12px}
  .sec h2{font-family:var(--serif);font-size:1.4rem;font-weight:700}
  .sec span{color:var(--sub);font-size:.92rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,290px),1fr));
    gap:20px;padding:4px 0 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:.2s;position:relative}
  @media(hover:hover){.card:hover{transform:translateY(-5px);box-shadow:var(--shadow-h)}}
  .thumb{position:relative;display:block;aspect-ratio:16/9;background:#0a0a0a;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:.3s}

  .body{padding:15px 16px 16px;display:flex;flex-direction:column;gap:9px;flex:1}
  .ttl{font-weight:800;font-size:1.06rem;line-height:1.42}

  .meta b{color:var(--ink);font-weight:700}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--chip);color:var(--sub);font-size:.78rem;padding:4px 10px;border-radius:7px;font-weight:600}

  .note{font-size:.9rem;color:var(--sub);margin:0}
  .open{margin-top:auto;min-height:var(--tap);display:flex;align-items:center;justify-content:center;

  .empty button{margin-top:14px;background:var(--brand);color:#fff;border:none;padding:11px 22px;

  footer{border-top:1px solid var(--line);background:#fff;color:var(--sub);font-size:.85rem;padding:26px 0 44px}
  footer p{margin:0 0 8px}
  .top{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));width:52px;height:52px;
    border-radius:50%;background:var(--brand-d);color:#fff;border:none;font-size:1.4rem;cursor:pointer;

  .top.show{opacity:1;pointer-events:auto}

  @media(max-width:820px){
    .fcard{grid-template-columns:1fr}
    .fthumb{aspect-ratio:16/9;min-height:0}
  }
  @media(max-width:720px){
    body{font-size:16px}
    .ctop{flex-wrap:wrap}
    .search{flex:1 1 100%;order:1}
    .seg{order:2}
    .moreBtn{order:3}
    .group{flex-direction:column;gap:6px}
    .group .lbl{flex:none;padding-top:0}
    .pills{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .pills::-webkit-scrollbar{display:none}
    .pill{white-space:nowrap;flex:0 0 auto}
    .grid{gap:15px}
  }
</style>
</head>

}
function refreshPills(){
  buildPills("fPos",POS,"pos"); buildPills("fType",TYPES,"type");
  buildPills("fLang",LANG,"lang"); buildPills("fCountry",COUNTRY,"country");
  document.querySelectorAll("#seg button").forEach(b=>b.classList.toggle("on",b.dataset.v===state.len));
  const active=JSON.stringify(state)!==JSON.stringify(DEFAULT);
  document.getElementById("clear").classList.toggle("show",active);
  document.getElementById("moreBtn").classList.toggle("has",
    state.pos!=="全部"||state.type!=="全部"||state.lang!=="全部"||state.country!=="全部");
}
function match(d){
  if(state.len!=="全部" && d.length_category!==state.len) return false;
  if(state.pos!=="全部" && !d.posture.includes(state.pos)) return false;
  if(state.type!=="全部" && !d.types.includes(state.type)) return false;
  if(state.lang!=="全部" && !d.language.includes(state.lang)) return false;
  if(state.country!=="全部" && !d.country.includes(state.country)) return false;
  if(state.q){
    const hay=(d.title+d.channel+d.country+d.language+d.posture+d.types.join("")+d.equipment+d.note).toLowerCase();
    if(!hay.includes(state.q.toLowerCase())) return false;
  }
  return true;
}
const durTxt=d=>`${d.approx?'約':''}${d.duration_min} 分`;

function renderFeature(){
  const d = DATA.find(x=>x.week===WK) || DATA[0];
  document.getElementById("feature").innerHTML=`
    <div class="fcard">
      <a class="fthumb" href="${d.url}" target="_blank" rel="noopener" aria-label="開啟 ${d.title}">
        <img src="${d.thumbnail}" alt="${d.title}" onerror="this.src='https://i.ytimg.com/vi/${d.id}/mqdefault.jpg'">
        <span class="fribbon">🌟 本週運動・第 ${d.week} 週</span>
        <span class="fplay"><span>▶</span></span>
        <span class="fdur">${durTxt(d)}</span>
      </a>
      <div class="fbody">
        <span class="feyebrow"><span class="wk">${d.length_category}</span> ${d.posture}</span>
        <h2 class="ftitle">${d.title}</h2>
        <div class="fmeta">📺 <b>${d.channel}</b>　|　${d.country}・${d.language}</div>
        <div class="ftags tags">
          ${d.types.map(t=>`<span class="tag">${t}</span>`).join("")}
          <span class="tag eq">道具：${d.equipment}</span>
        </div>
        <p class="fnote">${d.note}</p>
        <a class="fopen" href="${d.url}" target="_blank" rel="noopener">▶ 播放本週運動</a>
      </div>
    </div>`;
}

function render(){
  const list=DATA.filter(match).sort((a,b)=>a.week-b.week);
  document.getElementById("count").textContent=`顯示 ${list.length} / ${DATA.length} 部`;
  const active=JSON.stringify(state)!==JSON.stringify(DEFAULT);
  document.getElementById("secTitle").textContent = active ? "篩選結果" : "52 週運動計畫";
  document.getElementById("secSub").textContent = active ? "" : "每週一部，依序播放或自由挑選";
  const grid=document.getElementById("grid");
  if(!list.length){
    grid.innerHTML=`<div class="empty">找不到符合條件的影片 🙈<br><button onclick="resetAll()">清除篩選重新查詢</button></div>`;
    return;
  }
  grid.innerHTML=list.map(d=>{
    const is5=d.length_category==="5分鐘";
    return `<article class="card">
      <a class="thumb" href="${d.url}" target="_blank" rel="noopener" aria-label="開啟 ${d.title}">
        <img loading="lazy" src="${d.thumbnail}" alt="${d.title}" onerror="this.src='https://i.ytimg.com/vi/${d.id}/mqdefault.jpg'">
        <span class="wkbadge">第 ${d.week} 週</span>
        <span class="catflag ${is5?'cat5':'cat10'}">${d.length_category}</span>
        <span class="play"><span>▶</span></span>
        <span class="dur">${durTxt(d)}</span>
      </a>
      <div class="body">
        <h3 class="ttl">${d.title}</h3>
        <div class="meta"><span>📺 <b>${d.channel}</b></span><span>${d.country}・${d.language}</span></div>
        <div class="tags">
          <span class="tag">${d.posture}</span>
          ${d.types.map(t=>`<span class="tag">${t}</span>`).join("")}
          <span class="tag eq">道具：${d.equipment}</span>
        </div>
        <p class="note">${d.note}</p>
        <a class="open" href="${d.url}" target="_blank" rel="noopener">▶ 開啟 YouTube 跟著做</a>
      </div>
    </article>`;
  }).join("");
}

function resetAll(){ Object.assign(state,DEFAULT); document.getElementById("q").value=""; refreshPills(); render(); }
window.resetAll=resetAll;

document.addEventListener("click",e=>{
  const seg=e.target.closest("#seg button");
  if(seg){ state.len=seg.dataset.v; refreshPills(); render(); return; }
  const p=e.target.closest(".pill");
  if(p){ state[p.dataset.k]=p.dataset.v; refreshPills(); render(); }
});
document.getElementById("q").addEventListener("input",e=>{ state.q=e.target.value; refreshPills(); render(); });
document.getElementById("clear").addEventListener("click",resetAll);
const panel=document.getElementById("panel"), mb=document.getElementById("moreBtn");
mb.addEventListener("click",()=>{ const o=panel.classList.toggle("open"); mb.setAttribute("aria-expanded",o); });

const topBtn=document.getElementById("top");
addEventListener("scroll",()=>topBtn.classList.toggle("show",scrollY>600),{passive:true});
topBtn.addEventListener("click",()=>scrollTo({top:0,behavior:"smooth"}));

const c5=DATA.filter(d=>d.length_category==="5分鐘").length;
document.getElementById("heroBadges").innerHTML=
  `<span class="hb">📚 共 ${DATA.length} 部・52 週</span>`+
  `<span class="hb">⏱️ 5 分鐘 ${c5} 部</span>`+
  `<span class="hb">🕙 10 分鐘以上 ${DATA.length-c5} 部</span>`+
  `<span class="hb">🌏 台 / 港 / 日 / 歐美</span>`;
document.getElementById("updated").textContent="最後更新：2026-06-21｜共收錄 "+DATA.length+" 部影片（對應一年 52 週）";

renderFeature();
refreshPills();
render();
</script>
</body>
</html>
